name: novartis_pharma_sttm
version: "0.1.0"
config-version: 2
profile: novartis_pharma   # see profiles.yml (dev=duckdb, prod=snowflake)

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
snapshot-paths: ["snapshots"]

# enVision layers: Landing/Bronze handled by ingestion; dbt owns Enrich -> Data Mart -> RRD.
# ADR-005 S3-canonical migration: staging reads bronze parquet straight off S3 (still `view` —
# Enrich/Silver IS this thin transform layer, no separate Silver parquet write needed); intermediate
# unchanged (`ephemeral`); marts (Data Mart + RRD = ADR-005's "Gold") -> `external` materialized to
# S3 `gold/<run_id>/...` (Decision 1/6), location set per-model via the gold_run_location() macro.
vars:
  load_date: "{{ env_var('LAND_DATE', modules.datetime.date.today().strftime('%Y-%m-%d')) }}"
  run_id: "dev"

# ADR-005 Decision 2 documented deviation (see scripts/snapshot_beta_ndc.py docstring +
# dbt/macros/snapshot_s3_roundtrip.sql): dbt-core's `snapshot` materialization has no
# `external`/`location` hook, so S3 persistence for snap_beta_ndc's SCD2 history is implemented
# as on-run-start (load prior state from S3) / on-run-end (export new state to S3) hooks instead.
# Both macros gate on flags.WHICH in ['snapshot', 'build'] so `dbt run`/`dbt test` alone (without
# touching the snapshot) are unaffected; `dbt build` is the supported way to run this snapshot
# under Condition C (must build stg_beta__ndc + snap_beta_ndc in the SAME ephemeral session —
# see scripts/snapshot_beta_ndc.py for why a bare `dbt snapshot` fails cold).
on-run-start:
  - "{{ load_snap_beta_ndc_from_s3() }}"
on-run-end:
  - "{{ export_snap_beta_ndc_to_s3() }}"

models:
  novartis_pharma_sttm:
    staging:        # = Enrich (Silver), per-source, divergent — reads bronze/ parquet on S3
      +materialized: view
      +schema: enrich
    intermediate:   # consolidation step (crosswalk, conforming)
      +materialized: ephemeral
    marts:
      core:         # = Data Mart (STAR, system of record) — ADR-001. Gold, external -> S3.
        +materialized: external
        +schema: data_mart
      serving:      # = RRD (OBT, derived from star) — ADR-001. Gold, external -> S3.
        +materialized: external
        +schema: rrd

seeds:
  novartis_pharma_sttm:
    atc_pharmclass_crosswalk:
      +schema: enrich
